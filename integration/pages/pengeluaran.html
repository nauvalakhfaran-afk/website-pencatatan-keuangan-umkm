<!-- ============================================================
     pages/pengeluaran.html
     Halaman Pencatatan Pengeluaran
     Logic: assets/js/transaksi.js → tambahPengeluaran(), loadRiwayatJenis()
     ============================================================ -->
<div id="page-pengeluaran" class="page">

    <!-- Form tambah pengeluaran -->
    <div class="card">
        <h3 style="margin-bottom:16px">Tambah Pengeluaran</h3>
        <div id="alert-pengeluaran" class="alert"></div>
        <div class="grid-2">
            <div class="form-group">
                <label>Tanggal</label>
                <input type="date" id="pg-tanggal">
            </div>
            <div class="form-group">
                <label>Nama Pengeluaran</label>
                <input type="text" id="pg-nama" placeholder="Contoh: Pembelian bahan baku">
            </div>
            <div class="form-group">
                <label>Jumlah (Rp)</label>
                <input type="number" id="pg-jumlah" placeholder="0" min="0">
            </div>
            <div class="form-group">
                <label>Deskripsi</label>
                <input type="text" id="pg-keterangan" placeholder="Opsional">
            </div>
        </div>
        <button class="btn btn-danger" onclick="tambahPengeluaran()">+ Tambah Pengeluaran</button>
    </div>

    <!-- Tabel riwayat pengeluaran -->
    <div class="card">
        <h3 style="margin-bottom:12px">Riwayat Pengeluaran</h3>
        <div id="tabel-pengeluaran"></div>
    </div>

</div>

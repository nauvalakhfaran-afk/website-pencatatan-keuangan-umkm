<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiKeuangan - Sistem Keuangan Usaha</title>
    <!-- Bootstrap 5 CSS — diambil dari CDN jsDelivr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Style kustom SiKeuangan (override Bootstrap) -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Chart.js untuk grafik dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Bootstrap 5 JS Bundle (termasuk Popper) — diletakkan di head agar modal Bootstrap bisa dipakai -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <!-- ================================================================
         JAVASCRIPT — urutan load wajib dijaga
         1. utils.js     helper & api wrapper, HARUS pertama
         2. auth.js      login/logout
         3. nav.js       routing showPage()
         4. dashboard.js
         5. transaksi.js
         6. hpp.js
         7. bep.js
         8. laporan.js
         ================================================================ -->
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/nav.js"></script>
    <script src="assets/js/dashboard.js"></script>
    <script src="assets/js/transaksi.js"></script>
    <script src="assets/js/hpp.js"></script>
    <script src="assets/js/bep.js"></script>
    <script src="assets/js/laporan.js"></script>

    <script>
    // ================================================================
    // PAGE LOADER
    // Muat semua partial HTML dari folder pages/ secara berurutan,
    // injeksi ke DOM, lalu inisialisasi aplikasi dengan checkAuth().
    // ================================================================

    // Daftar partial → [file, id-kontainer-target]
    // 'body'       = append langsung ke <body>
    // id lainnya   = append ke document.getElementById(id)
    const PAGES = [
        ['pages/auth.html',        'body'       ],
        ['pages/sidebar.html',     'app-inner'  ],
        ['pages/dashboard.html',   'app-content'],
        ['pages/pemasukan.html',   'app-content'],
        ['pages/pengeluaran.html', 'app-content'],
        ['pages/transaksi.html',   'app-content'],
        ['pages/hpp.html',         'app-content'],
        ['pages/bep.html',         'app-content'],
        ['pages/laporan.html',     'app-content'],
        ['pages/modal-edit.html',  'body'       ],
    ];

    async function loadPages() {
        // Sisipkan kerangka #app lebih dulu agar target app-inner
        // dan app-content tersedia sebelum partial dimasukkan
        document.body.insertAdjacentHTML('beforeend', `
            <div id="app" style="display:none">
                <div id="app-inner" style="display:contents"></div>
                <div class="main-content">
                    <div class="topbar">
                        <h1 id="page-title">Dashboard</h1>
                        <button class="btn-logout" onclick="doLogout()">Keluar</button>
                    </div>
                    <div id="app-content"></div>
                </div>
            </div>
        `);

        try {
            for (const [file, targetId] of PAGES) {
                const res  = await fetch(file);
                if (!res.ok) throw new Error(`Gagal memuat ${file} (HTTP ${res.status})`);
                const html = await res.text();
                const el   = targetId === 'body' ? document.body
                                                 : document.getElementById(targetId);
                if (!el) throw new Error(`Elemen #${targetId} tidak ditemukan`);
                el.insertAdjacentHTML('beforeend', html);
            }
        } catch (err) {
            console.error(err);
            document.body.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:center;
                            min-height:100vh;font-family:Arial,sans-serif">
                    <div style="text-align:center;color:#dc2626">
                        <h2>&#9888;&#65039; Gagal Memuat Aplikasi</h2>
                        <p style="margin-top:8px;color:#555">${err.message}</p>
                        <p style="margin-top:6px;font-size:13px;color:#999">
                            Pastikan dijalankan lewat web server (XAMPP / WAMP),<br>
                            bukan dibuka langsung sebagai file HTML lokal.
                        </p>
                    </div>
                </div>`;
            return;
        }

        // Semua partial sudah di-inject — cek sesi login
        checkAuth();
    }

    loadPages();
    </script>

</body>
</html>
